# Generated by zipx — do not edit. Run 'sbt zipxWorkflowGenerate' to regenerate.
name: CI
"on":
  push:
    branches:
      - main
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  pull_request: null
  workflow_dispatch: null
jobs:
  verify-gate:
    name: verify-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: Skip Verify after merged PR push
        id: check
        run: |
          # Commits landed by merging/squashing a PR are associated with that PR via the API.
          prs=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq "[.[] | select(.merged_at != null and .base.ref == \"${{ github.ref_name }}\")] | length")
          if [ "$prs" -gt 0 ]; then
            echo "Merged PR push — skipping redundant Verify (already ran on the PR)"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
  test:
    name: test
    runs-on: ubuntu-latest
    needs:
      - verify-gate
    if: "!cancelled() && !startsWith(github.ref, 'refs/tags/') && ((needs.verify-gate.result != 'success') || (needs.verify-gate.outputs.run == 'true'))"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: "0"
      - name: Setup JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          distribution: temurin
          java-version: "25"
      - uses: sbt/setup-sbt@9d56cf12e9b58d219605e1d8bfe69a8395fedde0
        with:
          disk-cache: "false"
      - name: Cache sbt
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.sbt
            ~/.cache/sbt
            ~/.cache/coursier
            target
          key: ubuntu-latest-jdk25-sbt-0.0.2-ci-${{ github.run_id }}-test
          restore-keys: |
            ubuntu-latest-jdk25-sbt-0.0.2-ci-${{ github.run_id }}-
            ubuntu-latest-jdk25-sbt-0.0.2-ci-
            ubuntu-latest-jdk25-sbt-
      - name: test
        run: sbt 'workflow/test; core/test; central/test; docs/test; plugin/test'
  publish:
    name: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      PGP_KEY_HEX: ${{ secrets.PGP_KEY_HEX }}
      PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: "0"
      - name: Setup JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          distribution: temurin
          java-version: "25"
      - uses: sbt/setup-sbt@9d56cf12e9b58d219605e1d8bfe69a8395fedde0
        with:
          disk-cache: "false"
      - name: Cache sbt
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.sbt
            ~/.cache/sbt
            ~/.cache/coursier
            target
          key: ubuntu-latest-jdk25-sbt-0.0.2-ci-${{ github.run_id }}-publish
          restore-keys: |
            ubuntu-latest-jdk25-sbt-0.0.2-ci-${{ github.run_id }}-
            ubuntu-latest-jdk25-sbt-0.0.2-ci-
            ubuntu-latest-jdk25-sbt-
      - name: Import signing key
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback"   >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true
          echo "$PGP_SECRET" | base64 --decode | gpg --batch --import
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
      - name: publish
        run: sbt 'publishSigned; sonaRelease'
  docs:
    name: docs
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: early-effect/.github/.github/workflows/specular-docs.yml@main
    with:
      sbt-project: docs
